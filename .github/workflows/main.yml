name: README Grammar Check

on:
  workflow_dispatch: 
  push:
    paths:
      - "README.md"
  pull_request:
    paths:
      - "README.md"

jobs:
  grammar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install textlint
        run: |
          npm install -g textlint
          npm install -g textlint-rule-common-misspellings

      - name: Run grammar check and generate report
        run: |
          textlint README.md -f json > report.json || true
        continue-on-error: true

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: report.json
